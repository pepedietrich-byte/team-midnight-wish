<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050810" />

    <title>Team Midnight Wish — Pokémon MMO Guild</title>
    <meta name="description" content="Team Midnight Wish — Elite Pokémon MMO guild. Shiny hunting, PvP tournaments, legendary raids, and a community bonded by darkness and starlight." />

    <!-- Open Graph / Discord Unfurl -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Team Midnight Wish" />
    <meta property="og:description" content="Darkness. Starlight. The space between. Join the elite Pokémon MMO guild." />
    <meta property="og:image"       content="%sveltekit.assets%/assets/mascot/umbreon-cosmic.jpg" />
    <meta name="twitter:card"       content="summary_large_image" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-midnight text-white overflow-x-hidden">
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
